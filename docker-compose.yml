services:
  app:
    # Pre-built ARM64 image pushed from your dev machine (see `pnpm release`).
    # Portainer only pulls — it never builds.
    image: ${TLD_BUDDY_IMAGE:-ghcr.io/omrumbakitemiz/tld-buddy:latest}
    pull_policy: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # NUXT_* vars override runtimeConfig at container startup (not build time)
      NUXT_APP_PASSWORD: ${APP_PASSWORD}
      NUXT_REDIS_URL: redis://redis:6379
      # Set to false when accessing over plain HTTP (no reverse-proxy TLS)
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
