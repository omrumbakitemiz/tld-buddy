services:
  app:
    build: .
    image: tld-buddy:local
    container_name: tld-buddy-app
    ports:
      - "${PORT:-4000}:3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "tld-buddy"
    environment:
      NUXT_APP_PASSWORD: ${APP_PASSWORD}
      NUXT_REDIS_URL: redis://redis:6379
      # Set COOKIE_SECURE=false in .env for plain HTTP (homelab IP)
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tld-buddy-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
